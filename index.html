<!DOCTYPE html>
<html>
<script src="https://unpkg.com/@loaders.gl/core@3.4.4/dist/dist.min.js"></script>
<script src="https://unpkg.com/@loaders.gl/gltf@3.4.4/dist/dist.min.js"></script>
<script id="vertex-shader" type="x-shader/x-vertex">#version 300 es

layout(location = 0) in vec2 quadPosition;
layout(location = 1) in vec3 instancePosition;
layout(location = 2) in vec4 instanceColor;

uniform mat4 modelViewMatrix;
uniform mat4 projectionMatrix;

out vec4 vColor; // need to give color to fragment shader
out vec4 vViewPos; // need to give position to fragment shader

void main()
{
    // need to make splat center point toward camera
    vec4 viewCenter = modelViewMatrix * vec4(instancePosition, 1.0);

    // adding quad offsets to view to make splats parallel to screen
    // scale factor of ~0.002 seems to be a good resolution for these models to
    // render with most detail
    vec4 viewPos = viewCenter + vec4(quadPosition * 0.006, 0.0, 0.0);

    gl_Position = projectionMatrix * viewPos; // screen projection

    vColor = instanceColor; // pass color
    vViewPos = viewPos; // pass position
}
</script>

<script id="fragment-shader" type="x-shader/x-fragment">#version 300 es

precision highp float;

in vec4 vColor; // receive color
in vec4 vViewPos; // receive position

layout(location = 0) out vec4 outColor;
layout(location = 1) out vec4 outPos;

void main()
{
    outColor = vColor;

    outPos = vViewPos;
}
</script>

<script id="relighting-vertex-shader" type="x-shader/x-vertex">#version 300 es
layout(location = 0) in vec2 position;
out vec2 vTexCoord;

void main() {
    // translate vertex coords to texture coords
    vTexCoord = position * 0.5 + 0.5;
    gl_Position = vec4(position, 0.0, 1.0);
}
</script>

<script id="relighting-fragment-shader" type="x-shader/x-fragment">#version 300 es
precision highp float;

in vec2 vTexCoord;
out vec4 outColor;

uniform sampler2D uColorTex;
uniform sampler2D uPosTex;

const int r = 2;
const float wide_coef = 5.0; // controls how wide blur is
const float sharpness_coef = 1.0; // controls edge sharpness (lower is sharper)

// Bilateral filter smooths pixels that are close together, and doesn't blur edges and corners
vec3 filteredPos(vec2 uv, vec2 texSize, vec3 centerPos){
    vec3 filteredPos = vec3(0.0);
    float totalW = 0.0;

    // loop through all neighboring pixels
    for (int x = -r; x <= r; x++) {
        for (int y = -r; y <= r; y++) {
            vec2 offset = vec2(float(x), float(y));
            vec2 sampleUV = uv + offset * texSize;
            vec3 samplePos = texture(uPosTex, sampleUV).xyz;

            // skip background pixels
            if (samplePos.z == 0.0) continue;

            // spatial weight
            float spatialDist2 = dot(offset, offset);
            float spatialW = exp(-spatialDist2 / (2.0 * wide_coef * wide_coef));

            // range weight (the distance in 3D space)
            float rangeDist2 = dot(centerPos - samplePos, centerPos - samplePos);
            float rangeW = exp(-rangeDist2 / (2.0 * sharpness_coef * sharpness_coef));

            // combine weights
            float w = spatialW * rangeW;
            filteredPos = samplePos * w;
            totalW += w;
        }
    }
    // returns averaged position
    return totalW > 0.0 ? filteredPos / totalW : centerPos;
}

void main(){
    vec4 colorData = texture(uColorTex, vTexCoord);
    vec4 posData = texture(uPosTex, vTexCoord);

    // if there is no data (no import file) draw white background
    if (colorData.a == 0.0 && posData.z == 0.0){
        outColor = vec4(0.0, 0.0, 0.0, 0.0);
        return;
    }

    // make points and its neighbors
    vec2 texelSize = 1.0 / vec2(textureSize(uPosTex, 0));
    vec3 centerPos = posData.xyz;

    // filter surface to make smoother
    vec3 smoothPos = filteredPos(vTexCoord, texelSize, centerPos);

    // get psuedo-normals using neighbors by crossing the vectors between them
    // can us dFdx and dFdy apparently to get neighboring pixels during rasterization
    // makes calc faster
    vec3 diffx = dFdx(smoothPos);
    vec3 diffy = dFdy(smoothPos);
    vec3 normal = normalize(cross(diffx, diffy));

    // view lighting for now, put light behind camera
    vec3 lightDir = normalize(vec3(0.5, 0.5, 1.0));

    // find reflection using pseudo-normal
    float refl = max(dot(normal, lightDir), 0.0);

    // the coefficient multiplied below controls how strong the ambient light
    // shines on the splat, it is somewhat hard to tell with some models more than others
    vec3 ambient = 0.3 * colorData.rgb;
    vec3 diffuse = refl * colorData.rgb;

    outColor = vec4(ambient + diffuse, 1.0);
}

</script>

<script id="mesh-vertex-shader" type="x-shader/x-vertex">#version 300 es
layout(location = 0) in vec3 position;
layout(location = 1) in vec3 normal;
layout(location = 2) in vec2 texCoord;
layout(location = 3) in vec4 vertexColor;

uniform mat4 modelViewMatrix;
uniform mat4 projectionMatrix;
uniform mat4 modelMatrix; // skybox layout from example in class
uniform bool isSkybox;

// vars to process to fragment shader
out vec2 vTexCoord;
out vec3 vTexCoordObject;
out vec4 vVertexColor;
out vec3 vPos;

void main() {
    if (isSkybox){ // if skybox is true then skybox is being rendered so we use it's texture coordinates
        vTexCoordObject = position;

        // take camera's translation out to keep skybox near user
        // don't want skybox to have its own location in 3D space
        mat4 viewRotOnly = modelViewMatrix;
        viewRotOnly[3][0] = 0.0;
        viewRotOnly[3][1] = 0.0;
        viewRotOnly[3][2] = 0.0;

        gl_Position = projectionMatrix * viewRotOnly * modelMatrix * vec4(position, 1.0);
    } else { // skybox is not being rendered, pass the position for the mesh object
        //Diffuse
        //Calculate L
        //To calculate the lighting vector, we need to convert the normal position
        vec4 pos = modelViewMatrix * vec4(position, 1.0);
        vPos = pos.xyz;

        // if no uvs exist, use position to map texture
        if (length(texCoord) == 0.0) {
            vTexCoord = position.xy * 2.0;
        } else {
            vTexCoord = texCoord;
        }
        vVertexColor = vertexColor;
        gl_Position = projectionMatrix * pos;
    }
}
</script>

<script id="mesh-fragment-shader" type="x-shader/x-fragment">#version 300 es
precision highp float;
// vars to take in from vertex shader
in vec2 vTexCoord;
in vec3 vTexCoordObject;
in vec4 vVertexColor;
in vec3 vPos;

// skybox vars
uniform bool isSkybox;
uniform samplerCube texMap;
uniform sampler2D tex1;

// mesh lighting vars
uniform vec4 lightDiffuse, lightSpecular, lightAmbient;
uniform vec4 materialDiffuse, materialSpecular, materialAmbient;
uniform float shininess;
uniform vec4 lightPosition;

// spotlight vars
uniform vec3 spotDirection;
uniform float cutoff;
uniform float dropoff;

// for glass look
uniform mat4 modelViewMatrix;
uniform bool glassEnabled;

// shadows
uniform bool shadowEnabled;

out vec4 outColor;

void main() {
    if(shadowEnabled){
        outColor = vec4(0.0, 0.0, 0.0, 0.6);
        return; // just skip everything else
    }
    if (isSkybox){ // if the skybox is being rendered, use skybox texture
        outColor = texture(texMap, vTexCoordObject);
    } else { // if not, enable phong shading on mesh
        // using Phong lighting from example code in class with generated normal map
        // (glb's have no normal map)
        vec3 diffX = dFdx(vPos);
        vec3 diffY = dFdy(vPos);
        vec3 newN = normalize(cross(diffX, diffY));

        vec3 newL = normalize(lightPosition.xyz - vPos);
        vec3 newV = normalize(-vPos);

        // spotlght rendering
        vec3 lightToMesh = normalize(vPos - lightPosition.xyz);
        vec3 spotDir = normalize(spotDirection);

        // clive note for clive: need to use dot to compare angle between spotlight direction and direction of mesh point
        // if the angle is below the cutoff then don't render light there
        float spotProduct = dot(lightToMesh, spotDir);
        float spotGradient = 0.0;
        if(spotProduct > cutoff){
            spotGradient = pow(spotProduct, dropoff);
        }

        //Diffuse with cut off for negative light
        //Id = Ld kd dot(l • n)
        vec4 diffuse = lightDiffuse * materialDiffuse * max(dot(newL, newN), 0.0) * spotGradient;

        //Specular highlight
        //r = (2 (l · n ) n) - l
        vec3 R = 2.0 * (dot(newL, newN) * newN) - newL;

        //Is = Ls Ks dot(V, R)^a
        vec4 specular = lightSpecular * materialSpecular * pow(max(dot(newV, R), 0.0), shininess) * spotGradient;

        //Ambient lighting calculation
        //Ia = Laka
        vec4 ambient = lightAmbient * materialAmbient;

        vec4 fColor = diffuse + specular + ambient;
        fColor.a = 1.0;

        // still need to check for texture color, and use as base color if the vertex colors are not there
        // this is a fallback for other objects that are not passed in from the 2D to 3D api
        vec4 texColor = texture(tex1, vTexCoord);
        vec4 baseColor = (length(vVertexColor.rgb) > 0.0) ? vVertexColor : texColor;

        // for solid look
        vec4 solidColor = fColor * baseColor;

        if (glassEnabled){
            // for glass look from class activity
            vec3 incident = normalize(vPos);
            vec3 refl = reflect(incident, newN);

            // ratio of air to glass is 1 to 1.5 ~ish so .65
            vec3 refr = refract(incident, newN, 0.65);

            // need to convert vectors from skybox
            mat3 inversion = inverse(mat3(modelViewMatrix));
            vec3 invRefl = inversion * refl;
            vec3 invRefr = inversion * refr;

            // get colors
            vec4 reflColor = texture(texMap, invRefl);
            vec4 refrColor = texture(texMap, invRefr);
            outColor = (0.50 * refrColor) + (0.25 * reflColor) + (0.25 * solidColor);
            outColor.a = 1.0;
        } else {
            outColor = solidColor;
        }
    }
}
</script>
